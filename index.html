<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader ID Verification</title>
    <style>
        :root {
            --primary: #5E177D;
            --accent: #8e24aa;
            --bg: #0f0c29;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            width: 350px;
            text-align: center;
        }

        h2 { margin-bottom: 20px; font-weight: 300; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); transform: translateY(-2px); }

        #statusMsg {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }

        .success { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .error { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Verify Trader ID</h2>
    <input type="text" id="traderId" placeholder="Enter Trader ID (e.g. 12345)">
    <button id="verifyBtn" onclick="verifyID()">Verify Now</button>
    <div id="statusMsg"></div>
</div>

<script>
    async function verifyID() {
        const idInput = document.getElementById('traderId').value;
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('statusMsg');

        if (!idInput) return;

        // Loading state
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Checking...';
        status.style.display = 'none';

        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ traderId: idInput })
            });

            const data = await response.json();

            status.style.display = 'block';
            if (data.success) {
                status.className = 'success';
                status.innerText = "✅ Success! Access Granted.";
                // Yahan aap localstorage mein ID save kar sakte hain
                localStorage.setItem('verified_user', idInput);
            } else {
                status.className = 'error';
                status.innerText = "❌ Invalid ID! Please use our link.";
            }
        } catch (err) {
            status.style.display = 'block';
            status.className = 'error';
            status.innerText = "Connection error!";
        } finally {
            btn.disabled = false;
            btn.innerText = 'Verify Now';
        }
    }
</script>

</body>
</html>
