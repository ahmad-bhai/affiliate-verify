<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Meta Dashboard</title>
    <style>
        :root { --main: #5E177D; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; }
        .glass { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; text-align: center; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; margin-bottom: 15px; outline: none; }
        button { width: 85%; padding: 12px; background: var(--main); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; display: none; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border-bottom: 2px solid var(--main); }
        .stat-card span { font-size: 12px; color: #bbb; display: block; }
        .stat-card b { font-size: 18px; color: #fff; }
        #statusTag { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 10px; }
        .success { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass">
        <h2>Trader Verification</h2>
        <p style="font-size: 13px; color: #888;">Enter your Quotex ID to sync data</p>
        
        <input type="text" id="traderId" placeholder="Trader ID (e.g. 542163)">
        <button onclick="checkData()" id="btn">Sync Dashboard</button>

        <div id="statusTag" style="display: none;">Verified Affiliate Account</div>

        <div class="stats-grid" id="stats">
            <div class="stat-card"><span>Total Deposit</span><b id="dep">$0.00</b></div>
            <div class="stat-card"><span>Withdrawal</span><b id="wd">$0.00</b></div>
            <div class="stat-card"><span>Status</span><b id="st">Active</b></div>
            <div class="stat-card"><span>Country</span><b id="ctry">PK</b></div>
        </div>
    </div>
</div>

<script>
    async function checkData() {
        const id = document.getElementById('traderId').value;
        const btn = document.getElementById('btn');
        const stats = document.getElementById('stats');
        
        btn.innerText = "Connecting...";

        try {
            // Hum postback wali file ko hi hit kar rahe hain check karne ke liye
            const res = await fetch('/api/postback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ checkId: id })
            });

            const data = await res.json();

            if(data.success) {
                document.getElementById('statusTag').style.display = 'inline-block';
                document.getElementById('statusTag').className = 'success';
                stats.style.display = 'grid';
                document.getElementById('dep').innerText = '$' + data.balance;
                document.getElementById('wd').innerText = '$' + data.withdraw;
                document.getElementById('st').innerText = data.status.toUpperCase();
                document.getElementById('ctry').innerText = data.country;
            } else {
                alert("ID Not Found! Make sure you used our link.");
            }
        } catch (e) {
            console.log(e);
            alert("Sync Error: No data received from Quotex yet.");
        } finally {
            btn.innerText = "Sync Dashboard";
        }
    }
</script>

</body>
</html>
