<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Center</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #34ace1; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #252525; color: white; box-sizing: border-box; outline: none; border: 1px solid #444; }
        input:focus { border-color: #34ace1; }
        button { width: 100%; padding: 12px; background: #8B0000; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b30000; transform: translateY(-2px); }
        
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1; bottom: 30px; font-size: 14px; border-left: 5px solid #34ace1; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="card">
    <h2>Verify Account</h2>
    <input type="text" id="idInput" placeholder="Enter 8-digit ID" maxlength="8">
    <button onclick="checkID()">VERIFY NOW</button>
    <div id="statusText" style="margin-top: 15px; font-size: 13px;"></div>
</div>

<div id="toast"></div>

<script>
    function showToast(msg, color) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.borderLeftColor = color;
        t.className = "show";
        setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
    }

    async function checkID() {
        const id = document.getElementById("idInput").value;
        const statusText = document.getElementById("statusText");

        if (!/^\d{8}$/.test(id)) {
            showToast("Please enter only 8 digits ID ❗", "#8B0000");
            return;
        }

        statusText.innerText = "Checking...";
        
        try {
            const res = await fetch(`/api/verify?id=${id}`);
            const data = await res.json();

            if (data.status === 'success') {
                showToast("Success! Redirecting...", "#2ed573");
                statusText.innerHTML = `<a href="https://t.me/+Abcde12345" style="color:#34ace1">JOIN VIP CHANNEL</a>`;
            } else if (data.status === 'no_deposit') {
                showToast("Deposit Required ❗", "#eccc68");
                statusText.innerHTML = "Account created, but $20 deposit missing.";
            } else {
                showToast("Account Not Found ❌", "#8B0000");
                statusText.innerHTML = "Please create account with our link.";
            }
        } catch (e) {
            showToast("Server Error", "#8B0000");
        }
    }
</script>
</body>
</html>
